<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nando's Bounce Generator</title>
  <meta name="description" content="Fine-tune CSS button bounce animations with spring physics. Adjust scale, lift, wobble, and squash — then copy the generated CSS or Tailwind config." />
  <meta name="author" content="Nando Rossi" />
  <link rel="canonical" href="https://bounce.nan.do" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bounce.nan.do" />
  <meta property="og:title" content="Nando's Bounce Generator" />
  <meta property="og:description" content="Fine-tune CSS button bounce animations with spring physics. Adjust scale, lift, wobble, and squash — then copy the generated CSS or Tailwind config." />
  <meta property="og:site_name" content="nan.do" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://bounce.nan.do" />
  <meta name="twitter:title" content="Nando's Bounce Generator" />
  <meta name="twitter:description" content="Fine-tune CSS button bounce animations with spring physics. Adjust scale, lift, wobble, and squash — then copy the generated CSS or Tailwind config." />
  <meta name="twitter:creator" content="@nandorossi" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style id="dynamic-style"></style>
</head>
<body>
  <div class="app">

    <header>
      <div class="header-left">
        <a href="https://nan.do" class="back-link">← nan.do</a>
        <h1>Nando's Bounce Generator</h1>
      </div>
      <select id="preset-select">
        <option value="">Presets</option>
        <option value="Jelly Pop">Jelly Pop</option>
        <option value="Rocket Launch">Rocket Launch</option>
        <option value="Rubber Duck">Rubber Duck</option>
        <option value="Subtle Nod">Subtle Nod</option>
        <option value="Earthquake">Earthquake</option>
        <option value="Boing">Boing</option>
        <option value="Tilt-A-Whirl">Tilt-A-Whirl</option>
        <option value="Confident">Confident</option>
        <option value="Nervous Tick">Nervous Tick</option>
        <option value="Puppy Jump">Puppy Jump</option>
        <option value="Slow Bloom">Slow Bloom</option>
        <option value="Ping">Ping</option>
        <option value="Soap Bubble">Soap Bubble</option>
        <option value="Bowling Ball">Bowling Ball</option>
        <option value="Ping Pong">Ping Pong</option>
        <option value="Trampoline">Trampoline</option>
        <option value="Cat Pounce">Cat Pounce</option>
        <option value="Champagne Cork">Champagne Cork</option>
        <option value="Basketball">Basketball</option>
        <option value="Wet Dog">Wet Dog</option>
        <option value="Typewriter Key">Typewriter Key</option>
        <option value="Popcorn">Popcorn</option>
        <option value="Diving Board">Diving Board</option>
      </select>
    </header>

    <div class="top">
      <div class="preview-area">
        <button id="big-button" class="big-button">Hover me!</button>
      </div>

      <div class="controls">
        <fieldset>
          <legend>Effect</legend>
          <label>Scale
            <input type="range" id="scale" min="0" max="100" value="50" />
            <span id="scale-val">50</span>
          </label>
          <label>Lift
            <input type="range" id="lift" min="0" max="100" value="40" />
            <span id="lift-val">40</span>
          </label>
          <label>Wobble
            <input type="range" id="wobble" min="0" max="100" value="10" />
            <span id="wobble-val">10</span>
          </label>
          <label>Squash
            <input type="range" id="squash" min="0" max="100" value="20" />
            <span id="squash-val">20</span>
          </label>
        </fieldset>

        <fieldset>
          <legend>Spring</legend>
          <label>Stiffness
            <input type="range" id="stiffness" min="50" max="500" value="200" />
            <span id="stiffness-val">200</span>
          </label>
          <label>Damping
            <input type="range" id="damping" min="1" max="40" value="10" />
            <span id="damping-val">10</span>
          </label>
          <label>Mass
            <input type="range" id="mass" min="0.1" max="5" step="0.1" value="1" />
            <span id="mass-val">1</span>
          </label>
        </fieldset>
      </div>
    </div>

    <div class="output collapsed">
      <div class="output-header">
        <button id="toggle-btn" class="toggle-btn" aria-expanded="false">
          <svg class="toggle-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="toggle-label">View Code</span>
        </button>
        <div class="output-actions">
          <div class="tabs">
            <button class="tab active" data-tab="css">CSS</button>
            <button class="tab" data-tab="tailwind">Tailwind</button>
          </div>
          <button id="copy-btn" class="copy-btn">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="4.5" y="4.5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M2.5 8.5H2A1.5 1.5 0 0 1 .5 7V2A1.5 1.5 0 0 1 2 .5h5A1.5 1.5 0 0 1 8.5 2v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Copy Code
          </button>
        </div>
      </div>
      <pre id="code-output" class="code-output"></pre>
    </div>

    <footer class="site-footer">
      <span>© 2026 <a href="https://nan.do">Nando Rossi</a> — All rights reserved.</span>
    </footer>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>

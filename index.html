<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BouncyGen by Nando Rossi</title>
  <meta name="description" content="Fine-tune CSS button bounce animations with spring physics. Adjust scale, lift, wobble, and squash — then copy the generated CSS or Tailwind config." />
  <meta name="author" content="Nando Rossi" />
  <link rel="canonical" href="https://bounce.nan.do" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://bounce.nan.do" />
  <meta property="og:title" content="BouncyGen" />
  <meta property="og:description" content="Fine-tune CSS button bounce animations with spring physics. Adjust scale, lift, wobble, and squash — then copy the generated CSS or Tailwind config." />
  <meta property="og:site_name" content="nan.do" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://bounce.nan.do" />
  <meta name="twitter:title" content="BouncyGen" />
  <meta name="twitter:description" content="Fine-tune CSS button bounce animations with spring physics. Adjust scale, lift, wobble, and squash — then copy the generated CSS or Tailwind config." />
  <meta name="twitter:creator" content="@nandorossi" />

  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;800&display=swap" rel="stylesheet">
  <style id="dynamic-style"></style>
</head>
<body>
  <div class="app">

    <header>
      <div class="header-top">
        <div class="header-left">
          <a href="https://nan.do" class="back-link">← nan.do</a>
          <h1>BouncyGen</h1>
        </div>
        <div class="preset-row preset-row--desktop">
        <select id="preset-select">
        <option value="">Select Preset</option>
        <option>🍮 Jelly Pop</option>
        <option>🚀 Rocket Launch</option>
        <option>🦆 Rubber Duck</option>
        <option>🌋 Earthquake</option>
        <option>🎈 Boing</option>
        <option>🎡 Tilt-A-Whirl</option>
        <option>😎 Confident</option>
        <option>🐶 Puppy Jump</option>
        <option>🌸 Slow Bloom</option>
        <option>⚡ Snap</option>
        <option>🫧 Soap Bubble</option>
        <option>🎳 Bowling Ball</option>
        <option>🏓 Ping Pong</option>
        <option>🤸 Trampoline</option>
        <option>🐈 Cat Pounce</option>
        <option>🍾 Champagne Cork</option>
        <option>🏀 Basketball</option>
        <option>🐕 Wet Dog</option>
        <option>⌨️ Typewriter Key</option>
        <option>🍿 Popcorn</option>
      </select>
      <button id="reset-btn" class="reset-btn" title="Reset to defaults">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1.5 6.5a5 5 0 1 0 1.1-3.1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M1.5 2.5v2h2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Reset
      </button>
        </div>
      </div>
      <!-- Mobile-only preset row below title -->
      <div class="preset-row preset-row--mobile">
        <select id="preset-select-mobile" aria-label="Select preset"></select>
        <button id="reset-btn-mobile" class="reset-btn" title="Reset to defaults">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 6.5a5 5 0 1 0 1.1-3.1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M1.5 2.5v2h2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Reset
        </button>
      </div>
    </header>

    <div class="top">
      <div class="preview-area">
        <button id="big-button" class="big-button">Hover me!</button>
      </div>

      <div class="controls">
        <fieldset>
          <legend>Effect</legend>
          <label>
            <span class="label-name">Scale<span class="info-wrap"><button type="button" class="info-btn" aria-label="Scale: how much the button grows in size"><span class="info-icon">?</span></button><span class="tooltip" aria-hidden="true">How much the button grows in size</span></span></span>
            <input type="range" id="scale" min="0" max="100" value="50" />
            <span id="scale-val">50</span>
          </label>
          <label>
            <span class="label-name">Lift<span class="info-wrap"><button type="button" class="info-btn" aria-label="Lift: how high the button floats upward"><span class="info-icon">?</span></button><span class="tooltip" aria-hidden="true">How high the button floats upward</span></span></span>
            <input type="range" id="lift" min="0" max="100" value="40" />
            <span id="lift-val">40</span>
          </label>
          <label>
            <span class="label-name">Wobble<span class="info-wrap"><button type="button" class="info-btn" aria-label="Wobble: how much the button rotates side-to-side"><span class="info-icon">?</span></button><span class="tooltip" aria-hidden="true">How much the button rotates side-to-side</span></span></span>
            <input type="range" id="wobble" min="0" max="100" value="10" />
            <span id="wobble-val">10</span>
          </label>
          <label>
            <span class="label-name">Squash<span class="info-wrap"><button type="button" class="info-btn" aria-label="Squash: how much the button squishes vertically before bouncing"><span class="info-icon">?</span></button><span class="tooltip" aria-hidden="true">How much the button squishes vertically before bouncing</span></span></span>
            <input type="range" id="squash" min="0" max="100" value="20" />
            <span id="squash-val">20</span>
          </label>
        </fieldset>

        <fieldset>
          <legend>Spring</legend>
          <label>
            <span class="label-name">Stiffness<span class="info-wrap"><button type="button" class="info-btn" aria-label="Stiffness: how strong the spring force is"><span class="info-icon">?</span></button><span class="tooltip" aria-hidden="true">How strong the spring force is</span></span></span>
            <input type="range" id="stiffness" min="50" max="500" value="200" />
            <span id="stiffness-val">200</span>
          </label>
          <label>
            <span class="label-name">Damping<span class="info-wrap"><button type="button" class="info-btn" aria-label="Damping: how quickly the oscillation dies down — higher values settle faster"><span class="info-icon">?</span></button><span class="tooltip" aria-hidden="true">How quickly the oscillation dies down — higher values settle faster</span></span></span>
            <input type="range" id="damping" min="1" max="40" value="10" />
            <span id="damping-val">10</span>
          </label>
          <label>
            <span class="label-name">Mass<span class="info-wrap"><button type="button" class="info-btn" aria-label="Mass: how heavy the object feels; affects speed and overshoot"><span class="info-icon">?</span></button><span class="tooltip" aria-hidden="true">How heavy the object feels; affects speed and overshoot</span></span></span>
            <input type="range" id="mass" min="0.1" max="5" step="0.1" value="1" />
            <span id="mass-val">1</span>
          </label>
        </fieldset>
      </div>
    </div>

    <div class="output">
      <div class="output-header">
        <div class="tabs">
          <button class="tab active" data-tab="css">CSS</button>
          <button class="tab" data-tab="tailwind">Tailwind</button>
          <button class="tab" data-tab="framer">Framer</button>
          <button class="tab" data-tab="reactspring">React Spring</button>
        </div>
        <button id="copy-btn" class="copy-btn">
          <svg class="copy-icon" width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4.5" y="4.5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2.5 8.5H2A1.5 1.5 0 0 1 .5 7V2A1.5 1.5 0 0 1 2 .5h5A1.5 1.5 0 0 1 8.5 2v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="copy-label">Copy Code</span>
          <span class="copy-confirm">✓<span class="copy-confirm-text"> Copied!</span></span>
        </button>
      </div>
      <pre id="code-output" class="code-output"></pre>
    </div>

    <footer class="site-footer">
      <span>© 2026 <a href="https://nan.do">Nando Rossi</a> — All rights reserved.</span>
    </footer>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>

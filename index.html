<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bounce Generator</title>
  <style id="dynamic-style"></style>
</head>
<body>
  <div class="container">
    <h1>BOUNCE GENERATOR</h1>

    <div class="preview-area">
      <button id="big-button" class="big-button">Hover Me!</button>
    </div>

    <div class="controls">
      <fieldset>
        <legend>Effect</legend>
        <label>Scale <span id="scale-val">50</span>
          <input type="range" id="scale" min="0" max="100" value="50" />
        </label>
        <label>Lift <span id="lift-val">40</span>
          <input type="range" id="lift" min="0" max="100" value="40" />
        </label>
        <label>Wobble <span id="wobble-val">10</span>
          <input type="range" id="wobble" min="0" max="100" value="10" />
        </label>
        <label>Squash <span id="squash-val">20</span>
          <input type="range" id="squash" min="0" max="100" value="20" />
        </label>
      </fieldset>

      <fieldset>
        <legend>Spring Physics</legend>
        <label>Stiffness <span id="stiffness-val">200</span>
          <input type="range" id="stiffness" min="50" max="500" value="200" />
        </label>
        <label>Damping <span id="damping-val">10</span>
          <input type="range" id="damping" min="1" max="40" value="10" />
        </label>
        <label>Mass <span id="mass-val">1</span>
          <input type="range" id="mass" min="0.1" max="5" step="0.1" value="1" />
        </label>
      </fieldset>
    </div>

    <button id="copy-btn" class="copy-btn">📋 Copy CSS</button>
    <pre id="code-output" class="code-output"></pre>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
